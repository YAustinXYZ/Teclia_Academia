<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Teclia Logo</title>
  <desc>Logo minimalista de Teclia con teclas de piano en oro y negro</desc>

  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C96A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B8922A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="goldGradLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0D680;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect x="60" y="30" width="560" height="360" rx="20" fill="#0A0A0A"/>
  <rect x="60" y="30" width="560" height="360" rx="20" fill="none" stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.5"/>

