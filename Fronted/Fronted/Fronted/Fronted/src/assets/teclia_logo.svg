  <text x="340" y="292" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="300" letter-spacing="5" fill="#C9A84C" opacity="0.65">PIANO · MUSIC · MASTERY</text>
