    <rect x="389" y="110" width="32" height="90" rx="3" fill="#F5F0E8"/>
    <rect x="424" y="110" width="32" height="90" rx="3" fill="#F5F0E8"/>
    <rect x="245" y="110" width="4" height="90" fill="#0A0A0A"/>
    <rect x="280" y="110" width="4" height="90" fill="#0A0A0A"/>
    <rect x="315" y="110" width="4" height="90" fill="#0A0A0A"/>
    <rect x="350" y="110" width="4" height="90" fill="#0A0A0A"/>
